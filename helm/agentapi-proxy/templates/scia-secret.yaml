{{- $scia := .Values.scia | default dict }}
{{- $sciaEnabled := true }}
{{- if and (hasKey .Values "scia") (hasKey $scia "enabled") }}
{{- $sciaEnabled = $scia.enabled }}
{{- end }}
{{- $oauth := $scia.oauth | default dict }}
{{- $google := $oauth.google | default dict }}
{{- $googleSecret := $google.secret | default dict }}
{{- $notion := $oauth.notion | default dict }}
{{- $notionSecret := $notion.secret | default dict }}
{{- if and $sciaEnabled ($googleSecret.create | default true) (not $googleSecret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentapi-proxy.sciaSecretName" . }}
  labels:
    {{- include "agentapi-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: scia-oauth
type: Opaque
stringData:
  {{ $googleSecret.clientIdKey | default "client-id" }}: {{ $googleSecret.clientId | default "" | quote }}
  {{ $googleSecret.clientSecretKey | default "client-secret" }}: {{ $googleSecret.clientSecret | default "" | quote }}
{{- end }}
{{- if and $sciaEnabled ($notionSecret.create | default true) (not $notionSecret.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentapi-proxy.sciaNotionSecretName" . }}
  labels:
    {{- include "agentapi-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: scia-oauth
type: Opaque
stringData:
  {{ $notionSecret.clientIdKey | default "client-id" }}: {{ $notionSecret.clientId | default "" | quote }}
  {{ $notionSecret.clientSecretKey | default "client-secret" }}: {{ $notionSecret.clientSecret | default "" | quote }}
{{- end }}
