{{- $hasToken := .Values.github.token }}
{{- $hasApp := and .Values.github.app.id .Values.github.app.privateKey.secretName }}
{{- if and .Values.kubernetesSession.enabled (or $hasToken $hasApp) }}
{{- /*
  GitHub Session Secret (Authentication)

  SECURITY: This Secret is intentionally limited to a personal access token only.
  GitHub App credentials (App ID, installation ID, private key PEM, repository
  restriction) are NEVER placed here and are NEVER mounted into session Pods.

  For the GitHub App authentication path, the agentapi-proxy generates a
  short-lived installation access token server-side (using the App credentials
  available only to the proxy Deployment) and injects it into each session Pod
  as GITHUB_TOKEN via the session settings. The App ID, installation ID and
  private key therefore stay confined to the proxy process.

  The presence of this Secret (referenced via AGENTAPI_K8S_SESSION_GITHUB_SECRET_NAME)
  signals the proxy that GitHub authentication is configured. It may be empty
  when only GitHub App auth is used.

  Note: GITHUB_API and GITHUB_URL are in a separate Secret (github-config) so that
  params.github_token can override authentication without losing Enterprise Server settings.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentapi-proxy.fullname" . }}-github-session
  labels:
    {{- include "agentapi-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: github-session-credentials
type: Opaque
stringData:
  {{- /* Personal Access Token (optional). GitHub App credentials are never stored here. */}}
  {{- if .Values.github.token }}
  GITHUB_TOKEN: {{ .Values.github.token | quote }}
  {{- end }}
{{- end }}
---
{{- /*
  GitHub Config Secret (Enterprise Server Settings)
  This Secret contains GitHub Enterprise Server URL settings.
  Kept separate from authentication credentials so that params.github_token
  can override GITHUB_TOKEN without losing GITHUB_API and GITHUB_URL settings.
*/}}
{{- $githubEnterpriseApiUrl := .Values.github.enterprise.apiUrl }}
{{- if .Values.global }}
  {{- if .Values.global.github }}
    {{- if .Values.global.github.enterprise }}
      {{- $githubEnterpriseApiUrl = .Values.global.github.enterprise.apiUrl | default $githubEnterpriseApiUrl }}
    {{- end }}
  {{- end }}
{{- end }}
{{- $githubEnterpriseBaseUrl := .Values.github.enterprise.baseUrl }}
{{- if .Values.global }}
  {{- if .Values.global.github }}
    {{- if .Values.global.github.enterprise }}
      {{- $githubEnterpriseBaseUrl = .Values.global.github.enterprise.baseUrl | default $githubEnterpriseBaseUrl }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if and .Values.kubernetesSession.enabled (or $githubEnterpriseApiUrl $githubEnterpriseBaseUrl) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentapi-proxy.fullname" . }}-github-config
  labels:
    {{- include "agentapi-proxy.labels" . | nindent 4 }}
    app.kubernetes.io/component: github-config
type: Opaque
stringData:
  {{- if $githubEnterpriseApiUrl }}
  GITHUB_API: {{ $githubEnterpriseApiUrl | quote }}
  {{- end }}
  {{- if $githubEnterpriseBaseUrl }}
  GITHUB_URL: {{ $githubEnterpriseBaseUrl | quote }}
  {{- end }}
{{- end }}
