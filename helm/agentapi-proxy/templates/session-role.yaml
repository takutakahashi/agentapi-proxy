{{- if and .Values.kubernetesSession .Values.kubernetesSession.enabled }}
{{- $scia := .Values.scia | default dict }}
{{- $sciaEnabled := true }}
{{- if and (hasKey .Values "scia") (hasKey $scia "enabled") }}
{{- $sciaEnabled = $scia.enabled }}
{{- end }}
{{- $sciaRefreshSecretNames := list }}
{{- $sciaDynamicUsers := false }}
{{- if $sciaEnabled }}
{{- $sciaRefreshSecretNames = $scia.sessionRefreshTokenSecretNames | default (list "scia-oauth-default") }}
{{- $sciaDynamicUsers = dig "dynamicUsers" "enabled" false $scia }}
{{- end }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentapi-proxy-session
  labels:
    {{- include "agentapi-proxy.labels" . | nindent 4 }}
rules:
  # Minimal permissions for session pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
  # Permissions for credentials-sync sidecar to sync credentials.json to Secret
  # Note: 'get' is not needed - uses create-first then replace approach
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update"]
  {{- if $sciaDynamicUsers }}
  # Dynamic scia users derive refresh-token Secret names from the authenticated
  # user at runtime, so Kubernetes RBAC cannot enumerate resourceNames here.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  {{- else }}
  {{- with $sciaRefreshSecretNames }}
  # Permissions for the scia session sidecar to read only the per-user refresh
  # token Secrets explicitly listed by the operator. OAuth client Secrets must
  # remain readable only by the scia OAuth broker.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml . | nindent 6 }}
    verbs: ["get"]
  {{- end }}
  {{- end }}
{{- end }}
