---
# Default values for agentapi-proxy.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# =============================================================================
# グローバル設定 (オプション)
# =============================================================================
# 親チャート（ccplant等）から渡されるグローバル設定を受け取ります。
# これらの設定は後方互換性のためオプションです。
# global設定が存在しない場合、各設定のローカル値がフォールバックとして使用されます。
#
# global:
#   # UIホスト名 (agentapi-ui用)
#   hostname: ""
#   # APIホスト名 (agentapi-proxy用)
#   apiHostname: ""
#
#   github:
#     enterprise:
#       enabled: false
#       baseUrl: ""
#     oauth:
#       clientId: ""
#       clientSecret: ""
#
#   ingress:
#     className: nginx
#     tls:
#       enabled: true

replicaCount: 1

image:
  repository: ghcr.io/takutakahashi/agentapi-proxy
  pullPolicy: IfNotPresent
  # Image tag is not configurable and always uses Chart's appVersion

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # AWS IAM Role for S3 access (EKS + IRSA)
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT-ID:role/agentapi-s3-role
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

# Pod security context
# If not set, defaults to fsGroup: 999, runAsUser: 999, runAsGroup: 999
podSecurityContext: {}
# fsGroup: 999
# runAsUser: 999
# runAsGroup: 999

service:
  type: ClusterIP
  port: 8080
  agentapiPort: 9000

scia:
  # Deploy and configure scia Google OAuth broker/proxy integration.
  enabled: true
  image:
    repository: ghcr.io/takutakahashi/scia
    tag: "0.17.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  publicBaseUrl: ""
  proxyUrl: ""
  credential: ""
  todoistCredential: "default.todoist"
  userNamespace: ""
  dynamicUserSecretNamePrefix: scia-oauth-
  noProxy: "localhost,127.0.0.1,.svc,.cluster.local"
  googleHosts:
    - www.googleapis.com
    - tasks.googleapis.com
  googlePaths:
    - /calendar/v3/*
    - /tasks/v1/*
  todoistHosts:
    - api.todoist.com
  todoistPaths:
    - /api/v1/*
    - /rest/v2/*
    - /sync/v9/*
  sessionSidecar:
    enabled: true
    image: ghcr.io/takutakahashi/scia:0.17.0
    configImage: busybox:1.36
    port: 18081
  oauth:
    listen: "0.0.0.0:8081"
    redirectUrl: ""
    google:
      scope: "https://www.googleapis.com/auth/calendar.readonly"
      name: Google
      setup: {}
      scopes:
        - id: calendar-read
          value: "https://www.googleapis.com/auth/calendar.readonly"
          name: "Google Calendar read-only"
          desc: "Read Google Calendar events."
          group: calendar
          groupName: "Google Calendar"
          groupDesc: "Choose how much Google Calendar access to grant."
          enabled: true
        - id: calendar-write
          value: "https://www.googleapis.com/auth/calendar"
          name: "Google Calendar read/write"
          desc: "Read and write Google Calendar events."
          group: calendar
          groupName: "Google Calendar"
          groupDesc: "Choose how much Google Calendar access to grant."
          enabled: false
        - id: tasks-read
          value: "https://www.googleapis.com/auth/tasks.readonly"
          name: "Google Tasks read-only"
          desc: "Read Google Tasks and task lists."
          group: tasks
          groupName: "Google Tasks"
          groupDesc: "Choose how much Google Tasks access to grant."
          enabled: true
        - id: tasks-write
          value: "https://www.googleapis.com/auth/tasks"
          name: "Google Tasks read/write"
          desc: "Read and write Google Tasks and task lists."
          group: tasks
          groupName: "Google Tasks"
          groupDesc: "Choose how much Google Tasks access to grant."
          enabled: false
      # Secret-backed Google OAuth client credentials. Set create=false and
      # existingSecret to use a Secret managed outside Helm.
      secret:
        create: false
        existingSecret: ""
        clientIdKey: client-id
        clientSecretKey: client-secret
        clientId: ""
        clientSecret: ""
    todoist:
      enabled: false
      scope: "data:read_write"
      name: Todoist
      iconUrl: "https://todoist.com/favicon.ico"
      description: "Connect Todoist tasks and projects."
      setup: {}
      scopes:
        - id: read-write
          value: "data:read_write"
          name: "Todoist read/write"
          desc: "Read and write Todoist tasks and projects."
          enabled: true
        - id: task-add
          value: "task:add"
          name: "Todoist task add"
          desc: "Add Todoist tasks without reading existing data."
          enabled: false
      omitRedirectUrl: false
      secret:
        create: true
        existingSecret: ""
        clientIdKey: client-id
        clientSecretKey: client-secret
        clientId: ""
        clientSecret: ""
  service:
    port: 8081
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "250m"
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

asset:
  enabled: true
  backend: nginx
  publicBaseUrl: ""
  storagePath: /var/lib/agentapi-assets
  nginx:
    image:
      repository: nginx
      tag: "1.27-alpine"
      pullPolicy: IfNotPresent
    replicaCount: 1
    service:
      port: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "250m"
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  s3:
    bucket: ""
    region: ""
    prefix: "agentapi-assets/"
    endpoint: ""

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  # When empty, global.apiHostname or config.hostname is used.
  hosts: []
  tls: []
  # - secretName: agentapi-proxy-tls
  #   hosts:
  #     - agentapi.example.com

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "8Gi"
    cpu: 8

# GitHub configuration
github:
  # GitHub Personal Access Token (GitHub App を使わない場合)
  token: ""

  # GitHub Enterprise Server を使用する場合は true に設定
  enterprise:
    enabled: false
    # GitHub Enterprise Server のベース URL
    # 例: https://github.company.com
    baseUrl: ""
    # GitHub Enterprise Server API の URL
    # 例: https://github.company.com/api/v3
    apiUrl: ""
  # GitHub App 認証設定
  #
  # セキュリティ: ここで設定した GitHub App 資格情報（App ID / Installation ID /
  # private key PEM / repositoryRestriction）は agentapi-proxy の Deployment だけに
  # 渡され、セッション Pod には一切マウント・注入されません。
  # GitHub App 認証を使う場合、proxy はトークンブローカとして働きます: セッション Pod には
  # session-scoped なブローカクレデンシャルと endpoint のみを渡し、Pod は必要時に短命な
  # installation token をプロキシから取得します。これにより長時間セッションでも token 失効後
  # に git/gh が継続利用でき、App 資格情報はプロキシ内に閉じ込められます。
  # (External Session Manager など Pod がプロキシに折り返せない経路では、サーバサイドで一度
  # 解決した token を GITHUB_TOKEN として埋め込みます)
  app:
    # GitHub App ID (必須)
    # GitHub App設定画面の "App ID" に表示される数値
    id: ""
    # GitHub App Installation ID (任意)
    # 組織にインストール後のURLから取得: /settings/installations/12345678 -> 12345678
    # 未指定の場合、proxy が対象リポジトリから自動解決します。
    installationId: ""
    # GitHub App installation token を対象リポジトリに限定する場合は true
    # (proxy がサーバサイドでトークンを発行する際に適用されます)
    repositoryRestriction: false
    # GitHub App の秘密鍵（PEM形式）を含む Secret (必須)
    # この PEM は proxy Deployment のみにマウントされ、セッション Pod には渡りません。
    # kubectl create secret generic github-app-private-key --from-file=private-key=/path/to/app.private-key.pem
    privateKey:
      # Secret 名
      secretName: ""
      # Secret 内のキー名（通常は "private-key" のまま使用）
      key: "private-key"

# Application Configuration
config:
  # ホスト名設定 (例: agentapi.example.com)
  hostname: ""

  # 認証設定
  auth:
    static:
      enabled: false
      headerName: "X-API-Key"
    github:
      enabled: false
      baseUrl: "https://api.github.com"
      tokenHeader: "Authorization"
      oauth:
        clientId: ""
        clientSecret: ""
        scope: "read:user read:org project repo workflow"
        baseUrl: ""
        # 許可するリダイレクトURI (カンマ区切りで複数指定可能)
        allowedRedirectUris: ""

  # Claude Code 設定
  claude:
    # Claude Code の起動引数 (例: "--dangerously-skip-permissions")
    args: ""

  # VAPID (Web Push 通知) 設定
  vapid:
    # VAPID 公開鍵 (Web Push 通知用)
    publicKey: ""
    # VAPID 秘密鍵 (Web Push 通知用)
    privateKey: ""
    # VAPID 連絡先メールアドレス
    contactEmail: ""

  # ロールベース環境変数ファイル設定
  roleEnvFiles:
    enabled: false
    path: "/etc/role-env-files"
    loadDefault: true

  # 通知設定
  notification:
    # 通知ベースURL (例: https://example.com)
    # 末尾のスラッシュは含めない
    baseUrl: ""

  # Webhook 設定
  webhook:
    # Webhook URL のベースURL (例: https://example.com)
    # 設定しない場合はリクエストヘッダーから自動検出
    baseUrl: ""
    # GitHub Enterprise Server のデフォルトホスト名
    # webhook に enterprise_url が設定されていない場合、このホスト名でマッチング
    # 例: github.company.com (https:// なし)
    githubEnterpriseHost: ""

  # 暗号化設定
  encryption:
    # 暗号化キー (Base64エンコードされた32バイトの鍵)
    # 設定しない場合は暗号化なし (Noop) になります
    key: ""

# Environment variables
env: []
# - name: GITHUB_TOKEN
#   value: "your-token"
# - name: CLAUDE_ARGS
#   value: "--dangerously-skip-permissions"
# GitHub Enterprise Server を使用する場合の環境変数例
# - name: GITHUB_URL
#   value: "https://github.company.com"
# - name: GITHUB_API
#   value: "https://github.company.com/api/v3"

# Environment variables from ConfigMaps and Secrets
envFrom: []
# - configMapRef:
#     name: agentapi-config
# - secretRef:
#     name: agentapi-secrets

# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Auth configuration (stored in ConfigMap and mounted to the container)
# This allows complex authorization rules that cannot be easily expressed as environment variables
authConfig:
# Example configuration structure:
# github:
#   user_mapping:
#     default_role: "user"
#     default_permissions:
#       - "read"
#       - "session:create"
#       - "session:list"
#     team_role_mapping:
#       "myorg/admins":
#         role: "admin"
#         permissions:
#           - "*"
#       "myorg/developers":
#         role: "developer"
#         permissions:
#           - "read"
#           - "write"
#           - "execute"
#           - "session:create"
#           - "session:list"
#           - "session:delete"
#           - "session:access"
#       "myorg/viewers":
#         role: "viewer"
#         permissions:
#           - "read"
#           - "session:list"

# Role-based environment files configuration
# Map environment files to secrets - this creates the appropriate projected volume automatically
roleEnvFiles:
  # Configuration for role-based environment variables
  enabled: false

  # Simple mapping: filename -> secret configuration
  # ファイル名とSecretの設定を直接マッピング
  files:
    # "default.env":
    #   secretName: "agentapi-env-default"
    #   key: "default.env"
    # "admin.env":
    #   secretName: "agentapi-env-admin" 
    #   key: "admin.env"
    # "developer.env":
    #   secretName: "agentapi-env-developer"
    #   key: "developer.env"
    # "user.env":
    #   secretName: "agentapi-env-user"
    #   key: "user.env"
    # "guest.env":
    #   secretName: "agentapi-env-guest"
    #   key: "guest.env"
  
  # Example usage:
  # roleEnvFiles:
  #   enabled: true
  #   files:
  #     "default.env":
  #       secretName: "common-env-vars"
  #       key: "default.env"
  #     "admin.env":
  #       secretName: "admin-secrets"
  #       key: "admin-config"
  #     "developer.env":
  #       secretName: "dev-config"
  #       key: "development.env"

# Kubernetes Session Management
# Sessions are created as separate Kubernetes Deployments
kubernetesSession:
  # Number of replicas for the agentapi-proxy Deployment
  replicaCount: 3

  # Deprecated: session resources always use the Helm release namespace.
  namespace: ""

  # Container image for session pods
  # If empty, uses the same image as the proxy
  image: ""

  # Container image for the network-filter sidecar and initContainer (sandbox feature)
  networkFilterImage: "ghcr.io/takutakahashi/nfa:0.7.0"

  # Container image for restoring generated sandbox iptables rules.
  sandboxInitImage: "gcr.io/istio-release/iptables@sha256:88626c33372697bd006bbfc61d1e0d7b60ae9a988d1a7cac07cc834b13e5c21a"

  # Resource configuration for the network-filter sidecar and initContainer (sandbox feature)
  networkFilter:
    # Resources for the network-filter forward proxy sidecar container
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
    # Resources for the network-filter-setup init container
    initResources:
      requests:
        cpu: "50m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "64Mi"

  # Image pull policy for session pods
  imagePullPolicy: "IfNotPresent"

  # Service account for session pods (deprecated - always uses agentapi-proxy-session)
  # This setting is ignored. Session pods always use the hardcoded ServiceAccount name
  # "agentapi-proxy-session" which has minimal permissions (pods, configmaps read-only)
  # and cannot access secrets directly.
  serviceAccount: ""

  # Base port that agentapi listens on in session pods
  basePort: 9000

  # Resource requests and limits for session pods (Kubernetes standard format)
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # PVC configuration for session workdir
  pvc:
    # Enable PersistentVolumeClaim for session pods workdir
    # When disabled, EmptyDir is used instead (data is not persisted across pod restarts)
    enabled: true
    # Storage class for session PVCs (empty for default)
    storageClass: ""
    # Storage size for session PVCs
    storageSize: "10Gi"

  # Timeout settings (in seconds)
  podStartTimeout: 120
  podStopTimeout: 30

  # Session Pods poll the proxy internal API for provisioning jobs.
  #
  # This URL is also the base for the GitHub token broker endpoint
  # (/internal/sessions/:sessionId/github-token) that session Pods call to fetch
  # short-lived installation tokens on demand. When empty, the chart defaults to
  # the in-cluster Service DNS derived from the chart fullname
  # (http://<fullname>.<release-namespace>.svc.cluster.local:<service.port>),
  # so custom release names or fullnameOverride are handled automatically.
  provisioner:
    proxyUrl: ""

  # Node selector for session pods
  # Example:
  # nodeSelector:
  #   disktype: ssd
  #   kubernetes.io/arch: amd64
  nodeSelector: {}

  # Tolerations for session pods
  # Example:
  # tolerations:
  #   - key: "dedicated"
  #     operator: "Equal"
  #     value: "agent"
  #     effect: "NoSchedule"
  #   - key: "gpu"
  #     operator: "Exists"
  #     effect: "PreferNoSchedule"
  tolerations: []

  # Additional PodTemplateSpec fields to merge into every session pod.
  # This is rendered as a YAML file, mounted into the proxy pod, and applied
  # with Kubernetes strategic merge patch when each session workload is created.
  # The proxy preserves required session fields such as serviceAccountName,
  # restartPolicy, session labels, and the main agentapi container command/args.
  podTemplate: {}
  # metadata:
  #   annotations:
  #     example.com/template: "enabled"
  #   labels:
  #     workload-type: agent-session
  # spec:
  #   priorityClassName: agent-session
  #   imagePullSecrets:
  #     - name: ghcr-pull-secret
  #   volumes:
  #     - name: extra-config
  #       configMap:
  #         name: extra-config
  #   containers:
  #     - name: agentapi
  #       volumeMounts:
  #         - name: extra-config
  #           mountPath: /etc/extra-config
  #           readOnly: true

  # GitHub authentication for repository cloning in session pods
  # A github-session Secret is automatically created when github.token or
  # (github.app.id and github.app.privateKey.secretName) are set.
  # This Secret only ever contains a personal access token (GITHUB_TOKEN); GitHub
  # App credentials are never stored in it. For GitHub App auth, the proxy acts as a
  # token broker: session pods receive a session-scoped broker credential + endpoint
  # and fetch short-lived installation tokens on demand, so long-running sessions keep
  # working after a token expires. No GitHub App private key or configuration reaches
  # session pods.

  # Single base Kubernetes Secret shared by all sessions.
  # agentapi-proxy reads this Secret before each session starts and merges it at the lowest
  # priority (base → team → user). It contains a single settings.json key in the agentapi
  # settings format, which covers all per-session configuration in one place:
  #   - env_vars:       arbitrary environment variables injected into every session
  #   - auth_mode:      "bedrock" or "oauth" (overridden by team/user settings)
  #   - bedrock:        AWS Bedrock credentials/model (auth_mode=bedrock)
  #   - mcp_servers:    MCP server configurations merged into ~/.claude.json (Claude) and ~/.codex/config.toml (Codex)
  #   - marketplaces:   Claude Code marketplace URLs
  #   - enabled_plugins: Claude Code plugins to enable
  #   - hooks:          Claude Code hooks
  #
  # Secret naming conventions for team/user overrides:
  #   - Team settings: agentapi-settings-{team-name}
  #   - User settings: agentapi-settings-{user-id}
  #
  # Example base Secret:
  #   apiVersion: v1
  #   kind: Secret
  #   metadata:
  #     name: agentapi-settings-base
  #   stringData:
  #     settings.json: |
  #       {
  #         "auth_mode": "bedrock",
  #         "bedrock": {"model": "anthropic.claude-3-5-sonnet-20241022-v2:0"},
  #         "mcp_servers": {
  #           "github": {"type": "http", "url": "https://mcp-github.example.com"}
  #         },
  #         "marketplaces": {"myorg": {"url": "https://github.com/myorg/marketplace"}},
  #         "enabled_plugins": ["my-plugin@myorg"],
  #         "env_vars": {"MY_GLOBAL_VAR": "value"}
  #       }
  settingsBaseSecret: "agentapi-settings-base"

  # Slack Integration
  # claude-posts runs as a subprocess inside the agentapi container (not as a sidecar).
  # ACP agent types produce the history file used for Slack forwarding.
  slackIntegration:
    # Kubernetes Secret containing the Slack credentials (bot token + signing secret).
    # The bot token and signing secret are a pair belonging to the same Slack App,
    # so both are stored in the same Secret.
    # The Secret must exist in the same namespace as the session pods.
    # Create it with:
    #   kubectl create secret generic slack-credentials \
    #     --from-literal=bot-token=xoxb-... \
    #     --from-literal=signing-secret=xxxxxxxxxxxx
    botToken:
      # Secret name (required to enable Slack integration)
      secretName: ""
      # Key within the Secret that contains the bot token
      # Defaults to "bot-token"
      key: "bot-token"

    signingSecret:
      # Key within the Secret (same Secret as botToken.secretName) that contains the signing secret.
      # Used to set AGENTAPI_SLACK_SIGNING_SECRET on the agentapi-proxy server.
      # Defaults to "signing-secret"
      key: "signing-secret"

  # OpenTelemetry Collector Configuration
  # Enables Prometheus metrics collection from Claude Code in session pods.
  # otelcol always runs as an in-process subprocess inside the agentapi container,
  # started by the provisioner after user context is established. This ensures
  # metrics labels (user_id, session_id, etc.) are correct even with stock sessions.
  otelCollector:
    enabled: true

    # Container image for otelcol (used to pull the binary into the agentapi image)
    image: "otel/opentelemetry-collector-contrib:0.143.1"

    # Scrape interval for Claude Code metrics
    scrapeInterval: "15s"

    # Claude Code metrics port (where OTEL_METRICS_EXPORTER=prometheus exposes metrics)
    claudeCodeMetricsPort: 9464

    # Exporter port (where otelcol exposes labeled metrics)
    exporterPort: 9090

    # Resource limits are not applicable in in-process mode (otelcol shares the
    # agentapi container resources). Kept for reference only.
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

# Schedule Worker Configuration
# Enables delayed start and recurring (cron-based) session scheduling
scheduleWorker:
  # Enable schedule worker
  enabled: true

  # How often to check for due schedules
  checkInterval: "30s"

  # Leader election configuration (for multi-replica deployments)
  leaderElection:
    # Lease duration (how long leader holds the lock)
    leaseDuration: "15s"
    # Renew deadline (how often leader refreshes the lock)
    renewDeadline: "10s"
    # Retry period (how often non-leaders try to acquire lock)
    retryPeriod: "2s"

  # Schedule storage configuration
  storage:
    # Secret name for schedule data
    secretName: "agentapi-schedules"

# Slackbot Session Cleanup Worker Configuration
# Periodically deletes Slackbot sessions whose last message is older than sessionTTL.
# Uses the agentapi.proxy/slack-last-message-at annotation (or created-at as fallback).
slackbotCleanupWorker:
  # Enable slackbot session cleanup worker
  enabled: true

  # Session TTL: duration after last Slack message before a session is deleted
  # Supports Go duration format: "3h", "30m", "72h", etc.
  sessionTTL: "3h"

  # How often to scan for stale sessions
  checkInterval: "30m"

  # Dry-run mode: log stale sessions without actually deleting them.
  # Useful for verifying TTL settings before enabling real cleanup.
  dryRun: false

  # Leader election configuration (prevents duplicate deletions in multi-replica deployments)
  leaderElection:
    # Lease duration (how long the leader holds the lock)
    leaseDuration: "15s"
    # Renew deadline (how often the leader refreshes the lock)
    renewDeadline: "10s"
    # Retry period (how often non-leaders try to acquire the lock)
    retryPeriod: "2s"

# Stock Inventory Worker Configuration
# Keeps a pool of pre-warmed session pods for the configured pod capabilities.
stockInventoryWorker:
  # Enable stock inventory worker
  enabled: false

  # How often to check and replenish stock sessions
  checkInterval: "30s"

  # Desired number of available stock sessions matching the capability template
  targetCount: 2

  # Capability template for stock sessions. These must match the pod sidecars
  # expected by sessions the allocator should serve from stock.
  sandboxEnabled: false
  dockerEnabled: false

  # Optional capability pools. When set, each pool is replenished independently
  # and the single targetCount/sandboxEnabled/dockerEnabled fields above are
  # used only as defaults for pool entries with no targetCount.
  # To keep inventory for every sandbox/DinD combination, configure:
  # pools:
  #   - targetCount: 2
  #     sandboxEnabled: false
  #     dockerEnabled: false
  #   - targetCount: 2
  #     sandboxEnabled: false
  #     dockerEnabled: true
  #   - targetCount: 2
  #     sandboxEnabled: true
  #     dockerEnabled: false
  #   - targetCount: 2
  #     sandboxEnabled: true
  #     dockerEnabled: true
  pools: []

  # Leader election configuration (prevents duplicate stock creation in multi-replica deployments)
  leaderElection:
    # Lease duration (how long the leader holds the lock)
    leaseDuration: "15s"
    # Renew deadline (how often the leader refreshes the lock)
    renewDeadline: "10s"
    # Retry period (how often non-leaders try to acquire the lock)
    retryPeriod: "2s"

# =============================================================================
# Redis – 複数Pod間のセッションステータス同期
# =============================================================================
# replicaCount > 1 の場合は redis.enabled=true にすることを強く推奨します。
# Redis が無効の場合はノーオペレーション実装が使われ、ステータス同期は各Podのメモリ内
# のみになります（単一レプリカ運用では問題ありません）。
#
# enabled=true のとき Bitnami Redis サブチャートが一緒にデプロイされます。
# 外部 Redis を使いたい場合は enabled=false にして externalRedis を設定してください。
redis:
  # enabled=true: Bitnami Redis サブチャートをデプロイする
  enabled: false

  # Bitnami Redis サブチャートの設定
  # https://github.com/bitnami/charts/tree/main/bitnami/redis
  architecture: standalone
  image:
    tag: latest
    pullPolicy: Always
  auth:
    enabled: false
    password: ""
  master:
    kind: Deployment
    persistence:
      enabled: false
      size: 1Gi
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# 外部 Redis を使用する場合の設定（redis.enabled=false のときのみ有効）
externalRedis:
  # addr: "your-redis-host:6379"
  addr: ""
  # password: ""
  password: ""
  # db: 0
  db: 0
  # tlsEnabled: false
  tlsEnabled: false
  # タイムアウト設定（Goのduration文字列形式）
  dialTimeout: "5s"
  readTimeout: "3s"
  writeTimeout: "3s"
